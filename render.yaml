# Render Blueprint — one-click private demo of the university honeypot.
#
# This deploys the honeypot as a LOCKED demo: the whole site sits behind HTTP
# Basic auth (DEMO_GATE_*), so only people you hand the credential to can reach
# it. It is NOT an open, public clone of a real portal — keep it that way.
#
# How to use:
#   1. Push this repo to GitHub (already done).
#   2. On https://dashboard.render.com  ->  New  ->  Blueprint  ->  pick this repo.
#   3. Render reads this file and asks you to fill the values marked `sync: false`:
#        DEMO_GATE_PASS  — the password you give reviewers to open the demo
#        MONITOR_PASS    — your password for the /_monitor SOC dashboard
#   4. Deploy. You get a URL like  https://university-honeypot-xxxx.onrender.com
#
# Free tier sleeps after ~15 min idle; the first hit after sleep rebuilds the
# (shrunk) decoy DB and may take 30–60s before the page loads.

services:
  - type: web
    name: university-honeypot
    runtime: python
    plan: free
    region: frankfurt            # change to the region nearest you if you like
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.honeypot:app --workers 1 --threads 4 --timeout 120 --preload --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: HONEYPOT_HTTPS         # served over TLS by Render -> Secure cookies
        value: "1"
      - key: HONEYPOT_DB            # /tmp is writable on the ephemeral FS
        value: "/tmp/decoy.sqlite"
      - key: HONEYPOT_SCALE         # smaller decoy so cold starts build fast
        value: "0.3"
      - key: DEMO_GATE_USER
        value: "demo"
      - key: DEMO_GATE_PASS         # YOU set this in the Render prompt
        sync: false
      - key: MONITOR_USER
        value: "mahde"
      - key: MONITOR_PASS           # YOU set this in the Render prompt
        sync: false
      - key: HONEYPOT_SECRET        # strong random, generated by Render
        generateValue: true
